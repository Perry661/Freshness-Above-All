<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freshness Above All!</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#11d432",
              "background-light": "#f6f8f6",
              "background-dark": "#102213"
            },
            fontFamily: {
              display: ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "0.5rem",
              xl: "0.75rem",
              "2xl": "1rem",
              full: "9999px"
            }
          }
        }
      };
    </script>
    <style>
      html,
      body,
      #app {
        height: 100%;
      }

      body {
        min-height: 100dvh;
        overflow: hidden;
        font-family: "Plus Jakarta Sans", sans-serif;
        background:
          radial-gradient(circle at top, rgba(17, 212, 50, 0.12), transparent 35%),
          #f6f8f6;
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #11d43233;
        border-radius: 10px;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .boot-error {
        margin: 24px auto;
        max-width: 420px;
        border: 1px solid #fecaca;
        border-radius: 16px;
        background: #fff1f2;
        color: #991b1b;
        padding: 16px;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .radio-custom:checked {
        background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        background-color: #11d432;
        border-color: #11d432;
      }

      .sheet-enter {
        animation: sheet-enter 180ms ease-out;
      }

      @keyframes sheet-enter {
        from {
          opacity: 0;
          transform: translateY(16px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="bg-background-light text-slate-900">
    <div id="app"></div>
    <script>
      window.addEventListener("error", (event) => {
        const app = document.getElementById("app");
        if (!app) {
          return;
        }

        app.innerHTML = `
          <div class="boot-error">
            <strong>Page failed to load.</strong>\n\n${String(event.message || "Unknown error")}
          </div>
        `;
      });
    </script>
    <script src="./uiData.js"></script>
    <script src="./setting.js"></script>
    <script src="./add.js"></script>
    <script src="./addPic.js"></script>
    <script src="./scan.js"></script>
    <script src="./trash.js"></script>
    <script src="./calendar.js"></script>
    <script src="./sound.js"></script>
    <script src="./ui.js"></script>
  </body>
</html>
